<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Asam Lambung Naik</title>

  <style>
    :root {
      --green-dark: #007932;
      --green-main: #48C752;
      --green-light: #9AFF7F;
      --yellow: #FFFF00;
      --gold: #F6BB34;
      --black: #050505;
      --red: #ff1e1e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--black);

      /* SATU BACKGROUND UNTUK SEMUA */
      background:
        radial-gradient(circle at top center, rgba(255, 255, 255, 0.62) 0%, rgba(154, 255, 127, 0.32) 34%, transparent 62%),
        radial-gradient(circle at left center, rgba(72, 199, 82, 0.28) 0%, transparent 36%),
        radial-gradient(circle at right center, rgba(0, 121, 50, 0.22) 0%, transparent 38%),
        linear-gradient(180deg, #ddffdc 0%, #c5ffc3 45%, #eaffea 100%);
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    .top-color-line {
      width: 100%;
      height: 8px;
      background: linear-gradient(
        90deg,
        var(--green-dark) 0%,
        var(--green-main) 25%,
        var(--green-light) 50%,
        var(--yellow) 74%,
        var(--gold) 100%
      );
    }

    .hero-headline {
      width: 100%;
      padding: 22px 14px 4px;
      text-align: center;
      background: transparent;
      overflow: hidden;
    }

    .hero-title {
      margin: 0;
      padding: 0;
      width: 100%;
      font-size: clamp(20px, 2.35vw, 34px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -0.8px;
      text-transform: uppercase;
      color: var(--black);
      white-space: nowrap;
    }

    .hero-title .red-text {
      color: var(--red);
    }

    .hero-subtitle {
      margin: 7px 0 0;
      padding: 0;
      font-size: clamp(17px, 1.85vw, 25px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.4px;
      color: var(--black);
    }

    .image-section {
      width: 100%;
      margin: 0;
      padding: 0;
      line-height: 0;
      text-align: center;
      background: transparent;
    }

    .hero-image {
      display: block;
      width: min(100%, 760px);
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      padding: 0;
      border: 0;
      background: transparent;
    }

    .reading-note {
      width: 100%;
      padding: 10px 14px 24px;
      text-align: center;
      background: transparent;
    }

    .reading-note p {
      margin: 0;
      padding: 0;
      font-size: clamp(15px, 1.55vw, 20px);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--black);
    }

    .reading-note .red-text {
      color: #c40000;
      font-weight: 900;
    }

    @media (max-width: 768px) {
      .hero-headline {
        padding: 20px 10px 4px;
      }

      .hero-title {
        white-space: normal;
        font-size: clamp(22px, 6vw, 34px);
        line-height: 1.08;
      }

      .hero-title .black-line,
      .hero-title .red-line {
        display: block;
      }

      .hero-subtitle {
        margin-top: 6px;
        font-size: clamp(16px, 4.8vw, 23px);
      }

      .hero-image {
        width: 100%;
      }

      .reading-note {
        padding: 10px 12px 22px;
      }

      .reading-note p {
        font-size: clamp(14px, 4.2vw, 17px);
        line-height: 1.45;
      }
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <div class="top-color-line"></div>

    <header class="hero-headline">
      <h1 class="hero-title">
        <span class="black-line">JANGAN SEPELEKAN</span>
        <span class="red-line red-text"> ASAM LAMBUNG NAIK</span>
      </h1>

      <p class="hero-subtitle">Atasi Sekarang Sebelum Kronis!</p>
    </header>

    <section class="image-section">
      <img
        class="hero-image"
        src="./Krem%20Merah%20Muda%20Berwarna%20Estetik%20Presentasi%2043%20%281%29.png"
        alt=""
      />
    </section>

    <section class="reading-note">
      <p>
        “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
        Agar <span class="red-text">Asam Lambung Naik</span> Dapat Teratasi”
      </p>
    </section>
  </main>
</body>
</html>
