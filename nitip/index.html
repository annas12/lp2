<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Asam Lambung Naik</title>

  <style>
    :root {
      --green-dark: #007932;
      --green-main: #48C752;
      --green-light: #9AFF7F;
      --black: #050505;
      --red: #ff1e1e;
      --white: #ffffff;
      --soft-green: #f2fff4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(72, 199, 82, 0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(154, 255, 127, 0.22), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f2fff4 45%, #ffffff 100%);
      color: var(--black);
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background:
        linear-gradient(
          90deg,
          rgba(0, 121, 50, 0.08) 0%,
          rgba(255, 255, 255, 0.95) 18%,
          rgba(255, 255, 255, 1) 50%,
          rgba(255, 255, 255, 0.95) 82%,
          rgba(72, 199, 82, 0.08) 100%
        );
    }

    .landing-container {
      width: 100%;
      max-width: 720px;
      min-height: 100vh;
      background: var(--white);
      box-shadow: 0 20px 70px rgba(0, 121, 50, 0.10);
      overflow: hidden;
    }

    .hero-headline {
      width: 100%;
      padding: 24px 16px 8px;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #fbfffb 100%);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(22px, 4.2vw, 31px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.8px;
      text-transform: uppercase;
      color: var(--black);
      white-space: nowrap;
    }

    .hero-title .red-text {
      color: var(--red);
    }

    .hero-subtitle {
      margin: 8px 0 0;
      font-size: clamp(17px, 3vw, 23px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.4px;
      color: var(--black);
    }

    .image-section {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
      line-height: 0;
    }

    .hero-image {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border: 0;
    }

    .reading-note {
      width: 100%;
      padding: 12px 16px 22px;
      text-align: center;
      background: linear-gradient(180deg, #ffffff 0%, #f6fff7 100%);
    }

    .reading-note p {
      margin: 0;
      font-size: clamp(15px, 3vw, 18px);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--black);
    }

    .reading-note .red-text {
      color: #c40000;
      font-weight: 900;
    }

    @media (max-width: 520px) {
      .landing-container {
        max-width: 100%;
      }

      .hero-headline {
        padding: 20px 10px 6px;
      }

      .hero-title {
        white-space: normal;
        font-size: clamp(21px, 6.2vw, 28px);
        line-height: 1.08;
      }

      .hero-title .black-line,
      .hero-title .red-line {
        display: block;
      }

      .hero-subtitle {
        margin-top: 6px;
        font-size: clamp(16px, 4.8vw, 21px);
      }

      .reading-note {
        padding: 10px 14px 20px;
      }

      .reading-note p {
        font-size: clamp(14px, 4.3vw, 16px);
        line-height: 1.45;
      }
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <section class="landing-container">

      <header class="hero-headline">
        <h1 class="hero-title">
          <span class="black-line">JANGAN SEPELEKAN</span>
          <span class="red-line red-text"> ASAM LAMBUNG NAIK</span>
        </h1>

        <p class="hero-subtitle">Atasi Sekarang Sebelum Kronis!</p>
      </header>

      <section class="image-section">
        <img
          class="hero-image"
          src="./Krem%20Merah%20Muda%20Berwarna%20Estetik%20Presentasi%2043%20%281%29.png"
          alt=""
        />
      </section>

      <section class="reading-note">
        <p>
          “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
          Agar <span class="red-text">Asam Lambung Naik</span> Dapat Teratasi”
        </p>
      </section>

    </section>
  </main>
</body>
</html>
