<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asam Lambung Naik</title>

  <style>
    :root{
      --green-1:#39c64a;
      --green-2:#46d057;
      --green-3:#2fbc45;
      --green-4:#25a83e;
      --green-edge:#1f9837;

      --white:#ffffff;
      --black:#111111;
      --red:#ff2f2f;
      --red-dark:#d90000;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--black);
    }

    body{
      /* konsep: tengah putih samar, pinggir hijau cerah */
      background:
        radial-gradient(circle at center,
          rgba(255,255,255,0.62) 0%,
          rgba(255,255,255,0.42) 14%,
          rgba(210,255,210,0.28) 28%,
          rgba(117,227,117,0.22) 42%,
          rgba(70,208,87,0.16) 54%,
          rgba(57,198,74,0.00) 64%
        ),
        radial-gradient(circle at center,
          #7be56f 0%,
          #5fd95d 24%,
          #48cf56 46%,
          #35bf49 68%,
          #2db545 84%,
          #25a83e 100%
        );
      position:relative;
    }

    /* efek lembut seperti poster */
    body::before,
    body::after{
      content:"";
      position:fixed;
      pointer-events:none;
      z-index:0;
      border-radius:50%;
      filter:blur(10px);
      opacity:.42;
    }

    body::before{
      width:220px;
      height:220px;
      top:120px;
      left:-60px;
      background:radial-gradient(circle, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.10) 42%, transparent 75%);
    }

    body::after{
      width:260px;
      height:260px;
      right:-70px;
      bottom:120px;
      background:radial-gradient(circle, rgba(255,255,255,0.38) 0%, rgba(255,255,255,0.08) 40%, transparent 75%);
    }

    .page{
      position:relative;
      z-index:1;
      width:100%;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:28px 14px 34px;
    }

    .container{
      width:100%;
      max-width:980px;
      text-align:center;
    }

    .headline{
      margin:0 auto 8px;
      max-width:920px;
    }

    .headline h1{
      margin:0;
      font-size:clamp(28px, 4.2vw, 60px);
      line-height:1.06;
      font-weight:900;
      letter-spacing:-1px;
      text-transform:uppercase;
      color:var(--white);
      text-shadow:
        0 3px 0 rgba(12,104,27,0.35),
        0 10px 22px rgba(0,0,0,0.12);
    }

    .headline h1 .red{
      color:#ffe92f;
      text-shadow:
        -1px -1px 0 rgba(18,110,27,0.55),
         1px -1px 0 rgba(18,110,27,0.55),
        -1px  1px 0 rgba(18,110,27,0.55),
         1px  1px 0 rgba(18,110,27,0.55),
         0 4px 0 rgba(18,110,27,0.30),
         0 10px 22px rgba(0,0,0,0.10);
    }

    .headline h2{
      margin:10px 0 0;
      font-size:clamp(20px, 2.25vw, 34px);
      line-height:1.15;
      font-weight:900;
      letter-spacing:-0.4px;
      color:var(--white);
      text-shadow:
        0 2px 0 rgba(12,104,27,0.28),
        0 8px 18px rgba(0,0,0,0.08);
    }

    .visual{
      width:100%;
      max-width:760px;
      margin:4px auto 8px;
      position:relative;
    }

    .visual::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:78%;
      height:78%;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.08) 35%, transparent 72%);
      filter:blur(18px);
      z-index:-1;
    }

    .visual img{
      display:block;
      width:100%;
      height:auto;
      margin:0 auto;
      filter:drop-shadow(0 14px 24px rgba(0,0,0,0.12));
    }

    .note{
      max-width:900px;
      margin:8px auto 0;
      padding:0 10px;
    }

    .note p{
      margin:0;
      font-size:clamp(18px, 1.75vw, 28px);
      line-height:1.35;
      font-weight:900;
      letter-spacing:-0.3px;
      color:var(--white);
      text-shadow:
        0 2px 0 rgba(12,104,27,0.22),
        0 8px 18px rgba(0,0,0,0.08);
    }

    .note .red{
      color:#fff36a;
      text-shadow:
        -1px -1px 0 rgba(18,110,27,0.45),
         1px -1px 0 rgba(18,110,27,0.45),
        -1px  1px 0 rgba(18,110,27,0.45),
         1px  1px 0 rgba(18,110,27,0.45);
    }

    @media (max-width: 768px){
      .page{
        padding:18px 10px 24px;
      }

      .headline{
        margin-bottom:6px;
      }

      .headline h1{
        font-size:clamp(23px, 7.6vw, 40px);
        line-height:1.07;
      }

      .headline h2{
        margin-top:8px;
        font-size:clamp(16px, 5vw, 23px);
      }

      .visual{
        max-width:100%;
        margin:4px auto 8px;
      }

      .note{
        margin-top:6px;
        padding:0 4px;
      }

      .note p{
        font-size:clamp(15px, 4.4vw, 19px);
        line-height:1.35;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <section class="headline">
        <h1>
          JANGAN SEPELEKAN <span class="red">ASAM LAMBUNG NAIK</span>
        </h1>
        <h2>Atasi Sekarang Sebelum Kronis!</h2>
      </section>

      <section class="visual">
        <img src="./gambar2.png" alt="">
      </section>

      <section class="note">
        <p>
          “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
          Agar <span class="red">Asam Lambung Naik</span> Dapat Teratasi”
        </p>
      </section>
    </div>
  </main>
</body>
</html>
