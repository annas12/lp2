<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asam Lambung Naik</title>

  <style>
    :root {
      --green-dark: #007932;
      --green-main: #48C752;
      --green-light: #9AFF7F;
      --black: #111111;
      --red: #ff2b2b;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--black);
      background:
        radial-gradient(circle at top left, rgba(72, 199, 82, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(0, 121, 50, 0.08), transparent 30%),
        radial-gradient(circle at bottom center, rgba(154, 255, 127, 0.12), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f8fff8 45%, #f2fff2 100%);
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 1200px;
      min-height: 100vh;
      padding: 28px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .headline {
      width: 100%;
      max-width: 980px;
      margin: 0 auto 8px;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(30px, 4.2vw, 58px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: var(--black);
    }

    .headline h1 .red {
      color: var(--red);
    }

    .headline h2 {
      margin: 10px 0 0;
      font-size: clamp(20px, 2.2vw, 34px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--black);
    }

    .visual {
      width: 100%;
      max-width: 760px;
      margin: 8px auto 10px;
    }

    .visual img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .note {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .note p {
      margin: 0;
      font-size: clamp(18px, 1.8vw, 30px);
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--black);
    }

    .note .red {
      color: #cc0000;
      font-weight: 900;
    }

    @media (max-width: 768px) {
      .page {
        padding: 18px 12px 26px;
      }

      .headline {
        margin-bottom: 6px;
      }

      .headline h1 {
        font-size: clamp(26px, 8vw, 42px);
        line-height: 1.08;
      }

      .headline h2 {
        margin-top: 8px;
        font-size: clamp(18px, 5.3vw, 24px);
        line-height: 1.15;
      }

      .visual {
        max-width: 100%;
        margin: 6px auto 8px;
      }

      .note p {
        font-size: clamp(16px, 4.7vw, 20px);
        line-height: 1.35;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="headline">
      <h1>
        JANGAN SEPELEKAN <span class="red">ASAM LAMBUNG NAIK</span>
      </h1>
      <h2>Atasi Sekarang Sebelum Kronis!</h2>
    </section>

    <section class="visual">
      <img
        src="./Krem%20Merah%20Muda%20Berwarna%20Estetik%20Presentasi%2043%20%281%29.png"
        alt=""
      />
    </section>

    <section class="note">
      <p>
        “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
        Agar <span class="red">Asam Lambung Naik</span> Dapat Teratasi”
      </p>
    </section>
  </main>
</body>
</html>
