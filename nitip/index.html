<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asam Lambung Naik</title>

  <style>
    :root {
      --black: #111111;
      --red: #ff2a2a;
      --red-dark: #c70000;
      --green-edge: #0f6a2d;
      --green-mid: #2f9442;
      --green-soft: #58b85b;
      --green-center: #6bc766;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--black);

      /* background seperti contoh: pinggir gelap, tengah lebih terang */
      background:
        radial-gradient(circle at center,
          rgba(107, 199, 102, 0.95) 0%,
          rgba(88, 184, 91, 0.96) 18%,
          rgba(47, 148, 66, 0.98) 48%,
          rgba(20, 108, 42, 1) 78%,
          rgba(12, 86, 34, 1) 100%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* glow halus tambahan */
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10) 0%, transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.05) 0%, transparent 16%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,0.05) 0%, transparent 16%),
        radial-gradient(circle at 12% 82%, rgba(255,255,255,0.04) 0%, transparent 18%),
        radial-gradient(circle at 88% 78%, rgba(255,255,255,0.04) 0%, transparent 18%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
    }

    .headline {
      width: 100%;
      max-width: 980px;
      margin: 0 auto 10px;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(30px, 4.2vw, 58px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0,0,0,0.18),
        0 10px 24px rgba(0,0,0,0.10);
    }

    .headline h1 .red {
      color: #ff3131;
      text-shadow:
        0 2px 0 rgba(0,0,0,0.18),
        0 10px 24px rgba(0,0,0,0.10);
    }

    .headline h2 {
      margin: 10px 0 0;
      font-size: clamp(20px, 2.2vw, 34px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.4px;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0,0,0,0.14),
        0 8px 18px rgba(0,0,0,0.08);
    }

    .visual {
      width: 100%;
      max-width: 760px;
      margin: 8px auto 10px;
      position: relative;
    }

    .visual img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
      filter:
        drop-shadow(0 14px 26px rgba(0,0,0,0.14));
    }

    .note {
      width: 100%;
      max-width: 920px;
      margin: 4px auto 0;
      padding: 0 8px;
    }

    .note p {
      margin: 0;
      font-size: clamp(18px, 1.75vw, 28px);
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: -0.3px;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0,0,0,0.14),
        0 8px 18px rgba(0,0,0,0.08);
    }

    .note .red {
      color: #ffdfdf;
      font-weight: 900;
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px 10px 28px;
      }

      .headline {
        margin-bottom: 6px;
      }

      .headline h1 {
        font-size: clamp(24px, 7.5vw, 40px);
        line-height: 1.08;
      }

      .headline h2 {
        margin-top: 8px;
        font-size: clamp(17px, 5vw, 23px);
      }

      .visual {
        max-width: 100%;
        margin: 6px auto 8px;
      }

      .note {
        margin-top: 2px;
      }

      .note p {
        font-size: clamp(15px, 4.5vw, 20px);
        line-height: 1.35;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <section class="headline">
        <h1>
          JANGAN SEPELEKAN <span class="red">ASAM LAMBUNG NAIK</span>
        </h1>
        <h2>Atasi Sekarang Sebelum Kronis!</h2>
      </section>

      <section class="visual">
        <img src="./gambar2.png" alt="">
      </section>

      <section class="note">
        <p>
          “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
          Agar <span class="red">Asam Lambung Naik</span> Dapat Teratasi”
        </p>
      </section>
    </div>
  </main>
</body>
</html>
