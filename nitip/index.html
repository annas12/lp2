<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asam Lambung Naik</title>

  <style>
    :root {
      --green-dark: #007932;
      --green-main: #48C752;
      --green-light: #9AFF7F;
      --yellow: #FFFF00;
      --gold: #F6BB34;
      --black: #050505;
      --red: #ff1e1e;
      --white: #ffffff;
      --soft-bg: #f7fff8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(154, 255, 127, 0.18), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #f7fff8 100%);
      color: var(--black);
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .landing-container {
      width: 100%;
      max-width: 720px;
      background: var(--white);
      box-shadow: 0 18px 60px rgba(0, 121, 50, 0.10);
      overflow: hidden;
      position: relative;
    }

    .landing-container::before {
      content: "";
      display: block;
      width: 100%;
      height: 8px;
      background: linear-gradient(
        90deg,
        var(--green-dark) 0%,
        var(--green-main) 28%,
        var(--green-light) 52%,
        var(--yellow) 74%,
        var(--gold) 100%
      );
    }

    .hero-headline {
      width: 100%;
      padding: 18px 16px 6px;
      text-align: center;
      background: rgba(255, 255, 255, 0.96);
    }

    .hero-title {
      margin: 0;
      font-size: clamp(20px, 4.2vw, 30px);
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: -0.7px;
      text-transform: uppercase;
      color: var(--black);
      white-space: nowrap;
    }

    .hero-title .red-text {
      color: var(--red);
    }

    .hero-subtitle {
      margin: 6px 0 0;
      font-size: clamp(16px, 3vw, 21px);
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: -0.4px;
      color: var(--black);
    }

    .image-section {
      width: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .reading-note {
      width: 100%;
      padding: 12px 18px 20px;
      text-align: center;
      background: #ffffff;
    }

    .reading-note p {
      margin: 0;
      font-size: clamp(15px, 3vw, 18px);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--black);
    }

    .reading-note .red-text {
      color: #c40000;
      font-weight: 900;
    }

    @media (max-width: 520px) {
      .landing-container {
        max-width: 100%;
      }

      .hero-headline {
        padding: 16px 10px 5px;
      }

      .hero-title {
        white-space: normal;
        font-size: clamp(19px, 6.1vw, 25px);
        line-height: 1.12;
      }

      .hero-title .black-line,
      .hero-title .red-line {
        display: block;
      }

      .hero-subtitle {
        margin-top: 5px;
        font-size: clamp(15px, 4.8vw, 19px);
      }

      .reading-note {
        padding: 10px 14px 18px;
      }

      .reading-note p {
        font-size: clamp(14px, 4.2vw, 16px);
        line-height: 1.45;
      }
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <section class="landing-container">

      <header class="hero-headline">
        <h1 class="hero-title">
          <span class="black-line">JANGAN SEPELEKAN</span>
          <span class="red-line red-text"> ASAM LAMBUNG NAIK</span>
        </h1>

        <p class="hero-subtitle">
          Atasi Sekarang Sebelum Kronis!
        </p>
      </header>

      <section class="image-section">
        <img
          class="hero-image"
          src="nitip/Krem%20Merah%20Muda%20Berwarna%20Estetik%20Presentasi%2043%20(1).png"
          alt=""
        />
      </section>

      <section class="reading-note">
        <p>
          “Luangkan Waktu Selama 2-3 Menit Untuk Membaca Website Ini<br>
          Agar <span class="red-text">Asam Lambung Naik</span> Dapat Teratasi”
        </p>
      </section>

    </section>
  </main>
</body>
</html>
